version: "3.9"

services:
  ph_backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: ph_backend
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      - ./data:/app/data
      - ./agents/config.yaml:/app/agents/config.yaml:ro
    environment:
      - PTW_GHIDRA_BASE_URL=http://ph_ghidra:8000
      - PTW_MCP_BASE_URL=http://ph_ghidra:9000/mcp
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL:-}

  ph_ghidra:
    build:
      context: .
      dockerfile: docker/Dockerfile.ghidra
    container_name: ph_ghidra
    ports:
      - "127.0.0.1:8000:8000"
      - "127.0.0.1:9000:9000"
    volumes:
      - ./data:/app/data
    environment:
      - GHIDRA_INSTALL_DIR=/ghidra
      - GHIDRA_MCP_PORT=9000
      - GHIDRA_PIPE_BASE_URL=http://localhost:8000
      - GHIDRA_MCP_ALLOW_ORIGINS=*
    depends_on:
      - ph_backend

  ph_frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        # Frontend expects API under /api and server.mjs will proxy to backend.
        - VITE_API_BASE=/api
    container_name: ph_frontend
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - PTW_BACKEND_BASE_URL=http://ph_backend:8001
    depends_on:
      - ph_backend

